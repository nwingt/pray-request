name: PrayRequest

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write

jobs:
  bless:
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick and post verse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
        run: |
          set -euo pipefail
          summon_re='(^|[^[:alnum:]])@prayrequest([^[:alnum:]]|$)'
          if ! [[ "$PR_TITLE" =~ $summon_re || "${PR_BODY:-}" =~ $summon_re ]]; then
            echo "no @prayrequest in title or body — skipping auto-bless"
            exit 0
          fi
          bash scripts/pick-verse.sh | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -

  summon:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && contains(github.event.comment.body, '@prayrequest')
      && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick and post verse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,additions,changedFiles)
          export PR_TITLE=$(printf '%s' "$pr_json" | jq -r '.title')
          export PR_ADDITIONS=$(printf '%s' "$pr_json" | jq -r '.additions')
          export PR_CHANGED_FILES=$(printf '%s' "$pr_json" | jq -r '.changedFiles')
          bash scripts/pick-verse.sh | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
